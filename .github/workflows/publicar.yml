name: Atualizar dados e publicar

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 9 * * *' # 06:00 BRT — depois da atualização diária das fontes
  workflow_dispatch:

concurrency:
  group: publicacao
  cancel-in-progress: false

jobs:
  publicar:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Chave mensal do cache de fontes
        id: mes
        run: |
          echo "mes=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"
          echo "ano=$(date -u +%Y)" >> "$GITHUB_OUTPUT"

      # Arquivos-fonte oficiais (~800 MB): cache com chave mensal — na virada
      # do mês tudo é re-baixado (pega correções retroativas das fontes).
      - name: Cache dos arquivos-fonte
        uses: actions/cache@v4
        with:
          path: |
            dados/camara
            dados/senado
            dados/cldf
          key: fontes-${{ steps.mes.outputs.mes }}
          restore-keys: fontes-

      - name: Testes do backend
        working-directory: backend
        run: |
          uv sync
          uv run pytest -q

      # Dentro do mês, só o ano corrente precisa vir fresco a cada run.
      - name: Forçar frescor do ano corrente
        run: |
          ano='${{ steps.mes.outputs.ano }}'
          rm -f "dados/camara/Ano-${ano}.csv" \
                "dados/senado/despesa_ceaps_${ano}.csv" \
                "dados/cldf/cldf-${ano}.xlsx"

      # A CLI sai com código 1 se qualquer (fonte, ano) falhar -> sem deploy parcial.
      - name: Ingestão das fontes oficiais
        working-directory: backend
        run: |
          ano='${{ steps.mes.outputs.ano }}'
          uv run python -m radar.ingest --anos "2016-${ano}" --db ../dados/radar.duckdb --pasta ../dados
          uv run python -m radar.ingest --anos "2013-${ano}" --fontes cldf --db ../dados/radar.duckdb --pasta ../dados

      - name: Exportar JSONs estáticos
        working-directory: backend
        run: uv run python -m radar.exportar --db ../dados/radar.duckdb --saida ../frontend/public/dados

      - name: Testes e build do site
        working-directory: frontend
        run: |
          npm ci
          npm test
          npm run build

      - name: Publicar no Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/out --project-name radar-politicos --branch master --commit-dirty=true
